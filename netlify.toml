# ==============================================================================
# netlify.toml — Security hardening + cache control
# Hoàng Sâm · Bất động sản Sài Gòn
# ==============================================================================

[build]
  publish = "."

# ─────────────────────────────────────────────────────────────────────────────
# Security headers — áp mọi path
# ─────────────────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Chặn embed iframe (clickjacking)
    X-Frame-Options = "DENY"

    # Trình duyệt tôn trọng đúng MIME type
    X-Content-Type-Options = "nosniff"

    # Giữ privacy khi user click link ra ngoài
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Bắt buộc HTTPS trong 1 năm
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Chặn các API trình duyệt mình không dùng
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"

    # CSP: script chỉ từ gstatic (Firebase) + self; connect tới Firebase/Gemini/ipapi
    # 'unsafe-inline' cần cho inline onerror img + style critical.
    # XSS vector đã bịt ở tầng escapeHtml trong ui-render.js.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://*.firebase.com https://ipapi.co wss://*.firebaseio.com; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; media-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto: tel: https://zalo.me https://line.me; object-src 'none'; upgrade-insecure-requests"

# ─────────────────────────────────────────────────────────────────────────────
# Cache control
# ─────────────────────────────────────────────────────────────────────────────

# index.html: KHÔNG cache — user luôn nhận bản mới nhất sau deploy
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS modules: cache 1 giờ
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# CSS: cache 1 giờ
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Rules / docs không public
[[redirects]]
  from = "/rules/*"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/*.md"
  to = "/index.html"
  status = 404
